<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Merci ! — Mochi 🐾</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fffbf5;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .emoji { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.6rem; margin-bottom: 12px; color: #222; }
    p { color: #666; line-height: 1.6; margin-bottom: 12px; }
    a {
      display: inline-block;
      margin-top: 24px;
      background: #e8a87c;
      color: white;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.95rem;
    }
    a:hover { background: #d4906a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🐾</div>
    <h1>Merci pour ton achat !</h1>
    <p>Tu vas recevoir un email avec ton mot de passe pour accéder aux recettes.</p>
    <p>Vérifie tes spams si tu ne le reçois pas dans quelques minutes.</p>
    <a href="https://mochi-legoldenretriever.com">Retour au site</a>
  </div>
</body>
</html>
